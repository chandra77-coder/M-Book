name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app and sync to Android
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          echo "Checking for APK..."
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Found debug APK"
            cp "app/build/outputs/apk/debug/app-debug.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Create Release and Upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Mbook ${{ github.ref_name }}
          body: |
            # 🎉 Mbook ${{ github.ref_name }}
            
            ✅ **APK Ready for Installation!**
            
            ## 📥 How to Install:
            
            1. Download `mbook-app.apk` from the assets below
            2. Transfer to your Android phone
            3. Go to Settings → Security → Unknown Sources (toggle ON)
            4. Open file manager and tap the APK
            5. Install and enjoy!
          artifacts: mbook-app.apk
          token: ${{ secrets.GITHUB_TOKEN }}
