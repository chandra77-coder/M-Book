name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app and sync to Android
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          echo "Checking for APK..."
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Found debug APK"
            cp "app/build/outputs/apk/debug/app-debug.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            find . -name "*.apk"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            exit 1
          fi
      
      - name: Upload APK Artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mbook-apk
          path: mbook-app.apk
          retention-days: 30
      
      - name: Create Release
        if: env.BUILD_SUCCESS == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.${{ github.run_number }}
          name: Mbook v1.0.${{ github.run_number }}
          body: |
            # 🎉 Mbook v1.0.${{ github.run_number }}
            
            ✅ **APK Ready for Installation!**
            
            ## 📥 How to Install:
            
            1. Download `mbook-app.apk` from the assets below
            2. Transfer to your Android phone
            3. Go to Settings → Security → Unknown Sources (toggle ON)
            4. Open file manager and tap the APK
            5. Install and enjoy!
            
            ## ✨ Features:
            - 📊 Work entry tracking
            - 💰 Payment status management
            - 📱 QR code upload and display
            - 📈 Income analytics & reports
            - 💾 Local data storage
            - 🌙 Dark theme
            - 🔒 Complete privacy
          artifacts: mbook-app.apk
          token: ${{ secrets.GITHUB_TOKEN }}
