name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
      
      - name: Install Cordova and dependencies
        run: |
          npm install -g cordova@latest
          npm install -g gradle
      
      - name: Create and Build APK
        run: |
          # Create Cordova project
          cd /tmp
          cordova create mbook-app com.mbook.app Mbook
          cd mbook-app
          
          # Add Android platform
          cordova platform add android
          
          # Copy built web app
          rm -rf www/*
          cp -r $GITHUB_WORKSPACE/dist/* www/
          
          # Build APK
          echo "Building APK..."
          cordova build android --release 2>&1 || true
          
          # Check for APK
          echo "Checking for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          
          # Copy APK if found
          if [ -f "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_FOUND=true" >> $GITHUB_ENV
            echo "✅ APK built successfully!"
          elif [ -f "platforms/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp "platforms/android/app/build/outputs/apk/debug/app-debug.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_FOUND=true" >> $GITHUB_ENV
            echo "✅ Debug APK built successfully!"
          else
            echo "APK_FOUND=false" >> $GITHUB_ENV
            echo "❌ APK not found - checking build output..."
            find . -type f -name "build.log" -exec cat {} \;
          fi
      
      - name: Upload APK Artifact
        if: env.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mbook-apk-release
          path: mbook-app.apk
      
      - name: Create Release
        if: env.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Mbook v1.0.${{ github.run_number }}
          body: |
            # 🎉 Mbook v1.0.${{ github.run_number }} - Ready for Your Phone!
            
            ✅ **Your Mbook APK is ready to install on your Android phone!**
            
            ## 📥 Installation Steps:
            
            1. **Download** the `mbook-app.apk` file from the assets below
            2. **Transfer** to your Android phone (USB cable or cloud storage)
            3. **Enable Installation from Unknown Sources:**
               - Go to Settings → Security → Unknown Sources (toggle ON)
            4. **Install** by opening the APK file in your file manager
            5. **Launch** the Mbook app and start tracking!
            
            ## ✨ Features:
            - 📊 Work entry tracking dashboard
            - 💰 Payment status management (Paid/Unpaid/Undecided)
            - 📱 QR code upload and display
            - 📈 Income analytics & reports
            - 💾 Local data storage (all data stays on your phone)
            - 🌙 Dark theme with amber accents
            - ⚡ Fast & lightweight
            - 🔒 No cloud sync - complete privacy
            
            ## 🔒 Privacy & Security:
            - ✅ No cloud synchronization
            - ✅ Works completely offline
            - ✅ No ads or tracking
            - ✅ All data stored locally on your device
            
            ## 🚀 How to Update:
            Every time code is pushed to the main branch, a new APK is automatically built and released here!
            
            **Enjoy using Mbook!** 🎉
          files: mbook-app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Status
        run: |
          echo "========================================="
          if [ "${{ env.APK_FOUND }}" == "true" ]; then
            echo "✅ SUCCESS: APK built and released!"
            echo "📍 Download from: Releases section"
          else
            echo "❌ FAILED: APK build did not complete"
            echo "📍 Check logs above for details"
          fi
          echo "========================================="
