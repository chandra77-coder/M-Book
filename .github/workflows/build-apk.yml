name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 31
          ndk-version: 25.1.8937393
      
      - name: Install Cordova
        run: npm install -g cordova@latest
      
      - name: Create Cordova Project
        run: |
          cd /tmp
          cordova create mbook-cordova com.mbook.app Mbook
          cd mbook-cordova
          cordova platform add android@latest
          echo "✅ Cordova project created"
      
      - name: Copy Web App to Cordova
        run: |
          rm -rf /tmp/mbook-cordova/www/*
          cp -r $GITHUB_WORKSPACE/dist/* /tmp/mbook-cordova/www/
          echo "✅ Web app copied to Cordova project"
      
      - name: Build APK
        run: |
          cd /tmp/mbook-cordova
          cordova build android --release 2>&1 | tee build.log
          
          # Check for APK files
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null | head -10
          
          # Try to find and copy the APK
          if [ -f "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_FOUND=true" >> $GITHUB_ENV
            echo "✅ APK found and copied!"
          elif [ -f "platforms/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp "platforms/android/app/build/outputs/apk/debug/app-debug.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_FOUND=true" >> $GITHUB_ENV
            echo "✅ Debug APK found and copied!"
          else
            echo "APK_FOUND=false" >> $GITHUB_ENV
            echo "❌ APK not found"
            cat build.log
          fi
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: env.APK_FOUND == 'true'
        with:
          name: mbook-apk-release
          path: mbook-app.apk
      
      - name: Create GitHub Release
        if: env.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Mbook v1.0.${{ github.run_number }}
          body: |
            # 🎉 Mbook v1.0.${{ github.run_number }} - Ready for Your Phone!
            
            ✅ **Your Mbook APK is ready to install on your Android phone!**
            
            ## 📥 Installation Steps:
            
            1. **Download** the `mbook-app.apk` file from the assets below
            2. **Transfer** to your Android phone (USB cable or cloud storage)
            3. **Enable Installation from Unknown Sources:**
               - Go to Settings → Security → Unknown Sources (toggle ON)
            4. **Install** by opening the APK file in your file manager
            5. **Launch** the Mbook app and start tracking!
            
            ## ✨ Features:
            - 📊 Work entry tracking dashboard
            - 💰 Payment status management (Paid/Unpaid/Undecided)
            - 📱 QR code upload and display
            - 📈 Income analytics & reports
            - 💾 Local data storage (all data stays on your phone)
            - 🌙 Dark theme with amber accents
            - ⚡ Fast & lightweight
            - 🔒 No cloud sync - complete privacy
            
            ## 🔒 Privacy & Security:
            - ✅ No cloud synchronization
            - ✅ Works completely offline
            - ✅ No ads or tracking
            - ✅ All data stored locally on your device
            
            ## 🚀 How to Update:
            Every time code is pushed to the main branch, a new APK is automatically built and released here!
            
            **Enjoy using Mbook!** 🎉
          files: mbook-app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Status
        run: |
          echo "========================================="
          if [ "${{ env.APK_FOUND }}" == "true" ]; then
            echo "✅ SUCCESS: APK built and released!"
            echo "📍 Download from: Releases section"
          else
            echo "❌ FAILED: APK build did not complete"
            echo "📍 Check logs above for details"
          fi
          echo "========================================="
