name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create Android wrapper
        run: |
          mkdir -p android-app/app/src/main/assets
          cp -r dist/* android-app/app/src/main/assets/
          
          # Create minimal Android project structure
          mkdir -p android-app/app/src/main/java/com/mbook/app
          mkdir -p android-app/app/src/main/res/values
          mkdir -p android-app/app/src/main/res/layout
      
      - name: Build APK with Cordova
        run: |
          npm install -g cordova
          cordova create mbook-app com.mbook.app Mbook
          cd mbook-app
          cordova platform add android@latest
          cordova build android --release 2>&1 || true
          
          # Copy built APK if it exists
          if [ -f "platforms/android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp platforms/android/app/build/outputs/apk/release/app-release.apk ../mbook-release.apk
          fi
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mbook-apk
          path: mbook-release.apk
          if-no-files-found: ignore
      
      - name: Create Release
        uses: actions/create-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: Mbook v1.0.${{ github.run_number }}
          body: |
            # Mbook v1.0.${{ github.run_number }}
            
            Ready to install on Android devices!
            
            ## Installation:
            1. Download mbook-release.apk
            2. Transfer to your Android phone
            3. Enable "Unknown Sources" in Settings
            4. Install the APK
            5. Launch Mbook!
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: mbook-release.apk
          asset_name: mbook-v1.0.${{ github.run_number }}.apk
          asset_content_type: application/vnd.android.package-archive
