name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build APK with Cordova
        run: |
          set -e
          echo "Creating Cordova project..."
          cd /tmp
          rm -rf mbook-build
          cordova create mbook-build com.mbook.app Mbook
          cd mbook-build
          
          echo "Adding Android platform..."
          cordova platform add android@latest
          
          echo "Copying web app..."
          rm -rf www/*
          cp -r $GITHUB_WORKSPACE/dist/public/* www/
          
          echo "Building APK in debug mode..."
          cordova build android --debug
          
          echo "Checking for APK..."
          if [ -f "platforms/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Found debug APK"
            cp "platforms/android/app/build/outputs/apk/debug/app-debug.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_PATH=$GITHUB_WORKSPACE/mbook-app.apk" >> $GITHUB_ENV
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            echo "Listing build outputs..."
            find . -name "*.apk" 2>/dev/null || echo "No APK files found"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            exit 1
          fi
      
      - name: Upload APK Artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mbook-apk
          path: mbook-app.apk
          retention-days: 30
      
      - name: Create Release
        if: env.BUILD_SUCCESS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Mbook v1.0.${{ github.run_number }}
          body: |
            # 🎉 Mbook v1.0.${{ github.run_number }}
            
            ✅ **APK Ready for Installation!**
            
            ## 📥 How to Install:
            
            1. Download `mbook-app.apk` from the assets below
            2. Transfer to your Android phone
            3. Go to Settings → Security → Unknown Sources (toggle ON)
            4. Open file manager and tap the APK
            5. Install and enjoy!
            
            ## ✨ Features:
            - 📊 Work entry tracking
            - 💰 Payment status management (Paid/Unpaid/Undecided)
            - 📱 QR code upload and display
            - 📈 Income analytics & reports
            - 💾 Local data storage
            - 🌙 Dark theme
            - 🔒 Complete privacy
            
            ## 🔒 Privacy & Security:
            - ✅ No cloud synchronization
            - ✅ Works completely offline
            - ✅ No ads or tracking
            - ✅ All data stored locally on your device
          files: mbook-app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Failed Notification
        if: env.BUILD_SUCCESS != 'true'
        run: |
          echo "❌ APK build failed - check logs above"
          exit 1
