name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web app
        run: pnpm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-platform-tools android-sdk
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build APK
        run: |
          set -e
          echo "Creating Cordova project..."
          cd /tmp
          rm -rf mbook-build
          cordova create mbook-build com.mbook.app Mbook
          cd mbook-build
          
          echo "Adding Android platform..."
          cordova platform add android
          
          echo "Copying web app..."
          rm -rf www/*
          cp -r $GITHUB_WORKSPACE/dist/public/* www/
          
          echo "Building APK..."
          cordova build android --release --verbose 2>&1 | head -100
          
          echo "Checking for APK..."
          if [ -f "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "Found release APK"
            cp "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_PATH=$GITHUB_WORKSPACE/mbook-app.apk" >> $GITHUB_ENV
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          elif [ -f "platforms/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "Found debug APK"
            cp "platforms/android/app/build/outputs/apk/debug/app-debug.apk" "$GITHUB_WORKSPACE/mbook-app.apk"
            echo "APK_PATH=$GITHUB_WORKSPACE/mbook-app.apk" >> $GITHUB_ENV
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "APK not found, listing outputs..."
            find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          fi
      
      - name: Upload APK Artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mbook-apk
          path: mbook-app.apk
      
      - name: Create Release
        if: env.BUILD_SUCCESS == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Mbook v1.0.${{ github.run_number }}
          body: |
            # 🎉 Mbook v1.0.${{ github.run_number }}
            
            ✅ **APK Ready for Installation!**
            
            ## 📥 How to Install:
            
            1. Download `mbook-app.apk`
            2. Transfer to your Android phone
            3. Go to Settings → Security → Unknown Sources (toggle ON)
            4. Open file manager and tap the APK
            5. Install and enjoy!
            
            ## ✨ Features:
            - Work entry tracking
            - Payment status management (Paid/Unpaid/Undecided)
            - QR code upload
            - Income analytics
            - Local data storage
            - Dark theme
            - Complete privacy
          files: mbook-app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Failed Notification
        if: env.BUILD_SUCCESS != 'true'
        run: |
          echo "❌ APK build failed"
          exit 1
